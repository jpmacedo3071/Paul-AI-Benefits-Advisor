<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AdviceHR · Paul, your benefits coach</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); color: var(--fg-1); font-family: var(--font-sans); }
  * { box-sizing: border-box; }
  main { padding: 0 0 32px; }

  /* Decorative background arcs, derived from the logo ring, very subtle */
  .bg-decor { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .bg-decor svg { position: absolute; }
  .bg-decor .r1 { top: -280px; right: -220px; opacity: 0.35; }
  .bg-decor .r2 { bottom: -320px; left: -260px; opacity: 0.25; }

  .site { position: relative; z-index: 1; }

  /* Widget section, centred, soft lift */
  .widget-slot { max-width: 760px; margin: 8px auto 0; padding: 0 24px; }

  /* "Try asking" prompt chips above the widget */
  .prompts { max-width: 760px; margin: 0 auto 16px; padding: 0 24px; }
  .prompts-label {
    font-family: var(--font-sans); font-size: 12px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--brand-blue);
    text-align: center; margin-bottom: 12px;
  }
  .prompts-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  }
  .prompt-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: #fff;
    border: 1px solid var(--border-default); border-radius: 14px;
    font-family: var(--font-sans); font-size: 14px; line-height: 1.4;
    color: var(--navy-900); text-align: left;
    box-shadow: 0 1px 2px rgba(10,61,98,0.04);
  }
  .prompt-chip-icon {
    flex-shrink: 0; color: var(--brand-blue); display: inline-flex;
  }

  @media (max-width: 640px) {
    .prompts-grid { grid-template-columns: 1fr; }
  }

  /* "Under the widget" note */
  .widget-note {
    max-width: 600px; margin: 18px auto 0; text-align: center;
    font-size: 13px; color: var(--fg-2); line-height: 1.6;
  }
  .widget-note a { color: var(--brand-blue); }

  /* How-it-works strip */
  .how { max-width: 1120px; margin: 72px auto 0; padding: 0 40px; }
  .how-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 28px; }
  .how-card {
    background: #fff; border: 1px solid var(--border-default); border-radius: 20px;
    padding: 24px; box-shadow: 0 1px 2px rgba(10,61,98,0.04);
    display: flex; flex-direction: column; gap: 10px; position: relative;
  }
  .how-num {
    font-family: var(--font-serif); font-size: 28px; color: var(--accent-100); line-height: 1;
    margin-bottom: 4px;
  }
  .how-title { font-family: var(--font-sans); font-weight: 600; font-size: 16px; color: var(--navy-900); }
  .how-body { font-family: var(--font-sans); font-size: 14px; color: var(--fg-2); line-height: 1.6; margin: 0; }

  .section-eyebrow { font-family: var(--font-sans); font-size: 12px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--brand-blue); text-align: center; margin-bottom: 10px; }
  .section-title { font-family: var(--font-serif); font-size: 32px; color: var(--navy-900); text-align: center; margin: 0; font-weight: 400; letter-spacing: -0.01em; }

  @media (max-width: 720px) {
    .how-grid { grid-template-columns: 1fr; }
    header nav { display: none; }
  }
</style>
</head>
<body>

<div class="bg-decor" aria-hidden="true">
  <svg class="r1" width="620" height="620" viewBox="0 0 100 100" fill="none">
    <circle cx="50" cy="50" r="48" stroke="#004AAD" stroke-width="0.4"/>
    <circle cx="50" cy="50" r="36" stroke="#004AAD" stroke-width="0.3"/>
    <circle cx="50" cy="50" r="24" stroke="#004AAD" stroke-width="0.2"/>
  </svg>
  <svg class="r2" width="680" height="680" viewBox="0 0 100 100" fill="none">
    <circle cx="50" cy="50" r="48" stroke="#2E86DE" stroke-width="0.4"/>
    <circle cx="50" cy="50" r="36" stroke="#2E86DE" stroke-width="0.3"/>
  </svg>
</div>

<div class="site" id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

<script type="text/babel" src="Header.jsx?v=5"></script>
<script type="text/babel" src="Hero.jsx?v=4"></script>
<script type="text/babel" src="TrustStrip.jsx?v=3"></script>
<script type="text/babel" src="ChatWidget.jsx?v=2"></script>
<script type="text/babel" src="FAQ.jsx?v=2"></script>
<script type="text/babel" src="Footer.jsx?v=3"></script>

<script type="text/babel">
  function HowItWorks() {
    return (
      <section className="how" id="how">
        <div className="section-eyebrow">How it works</div>
        <h2 className="section-title">Three steps, no paperwork</h2>
        <div className="how-grid">
          <div className="how-card">
            <div className="how-num">01</div>
            <div className="how-title">Get your access code</div>
            <p className="how-body">Access codes are only available through your employer, usually shared by email. Can't find yours? Ask your HR contact.</p>
          </div>
          <div className="how-card">
            <div className="how-num">02</div>
            <div className="how-title">Ask anything about your plans</div>
            <p className="how-body">Paul knows your medical plans and your ancillary benefits too, including dental, vision, life, and more. Ask about carriers, deductibles, or covered prescriptions, all answered in plain English.</p>
          </div>
          <div className="how-card">
            <div className="how-num">03</div>
            <div className="how-title">Choose with confidence</div>
            <p className="how-body">Take what you've learned into open enrollment. Your HR team is still there for anything Paul can't answer.</p>
          </div>
        </div>
      </section>
    );
  }

  function App() {
    return (
      <main>
        <Header />
        <Hero />
        <section className="prompts" aria-label="Example questions">
          <div className="prompts-label">Try asking Paul</div>
          <div className="prompts-grid">
            {[
              "How can I lower my medical costs?",
              "What's the best plan for my situation?",
              "Help me use all the benefits available to me.",
              "I'm on [medication], how can I buy it for the lowest cost?",
            ].map((q, i) => (
              <div className="prompt-chip" key={i}>
                <span className="prompt-chip-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                  </svg>
                </span>
                <span>{q}</span>
              </div>
            ))}
          </div>
        </section>
        <div className="widget-slot">
          <ChatWidget />
          <p className="widget-note">
            Need your access code? Reach out to your employer. Prefer a 1-on-1 with a human, or want to talk through a recommendation Paul helped you make?{" "}
            <a href="https://outlook.office.com/bookwithme/user/6b2a9de988c44438b526fa0c3ed79930@advicehr.net/meetingtype/o66_yH99c0GhK_p_ad1WaA2?anonymous&ep=mlink" target="_blank" rel="noopener noreferrer">Book time with a benefits advisor</a>.
          </p>
        </div>
        <TrustStrip />
        <HowItWorks />
        <FAQ />
        <Footer />
      </main>
    );
  }

  // Wait for all external JSX components to finish loading before rendering
  function waitForComponents(names, callback, interval = 50) {
    if (names.every(n => typeof window[n] !== 'undefined')) {
      callback();
    } else {
      setTimeout(() => waitForComponents(names, callback, interval), interval);
    }
  }

  waitForComponents(
    ['Header', 'Hero', 'TrustStrip', 'ChatWidget', 'FAQ', 'Footer'],
    () => {
      const Header     = window.Header;
      const Hero       = window.Hero;
      const TrustStrip = window.TrustStrip;
      const ChatWidget = window.ChatWidget;
      const FAQ        = window.FAQ;
      const Footer     = window.Footer;
      ReactDOM.createRoot(document.getElementById("app")).render(<App />);
    }
  );
</script>

</body>
</html>
