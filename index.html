*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg-page);color:var(--fg-1);font-family:var(--font-sans);}
a{color:var(--fg-link);text-decoration:underline;text-underline-offset:2px;}

.bg-decor .r2{bottom:-320px;left:-260px;opacity:.25;}
.site{position:relative;z-index:1;padding-bottom:32px;}
.widget-slot{max-width:760px;margin:8px auto 0;padding:0 24px;}
.prompts{max-width:760px;margin:0 auto 16px;padding:0 24px;}
.prompts-label{font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--brand-blue);text-align:center;margin-bottom:12px;}
.prompts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.prompt-chip{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border:1px solid var(--border-default);border-radius:14px;font-size:14px;line-height:1.4;color:var(--navy-900);box-shadow:var(--shadow-xs);}
.prompt-chip-icon{flex-shrink:0;color:var(--brand-blue);display:inline-flex;}
.widget-note{max-width:600px;margin:18px auto 0;text-align:center;font-size:13px;color:var(--fg-2);line-height:1.6;}
.how{max-width:1120px;margin:72px auto 0;padding:0 40px;}
.how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:28px;}
.how-card{background:#fff;border:1px solid var(--border-default);border-radius:20px;padding:24px;box-shadow:var(--shadow-xs);display:flex;flex-direction:column;gap:10px;}
.how-num{font-family:var(--font-serif);font-size:28px;color:var(--accent-100);line-height:1;margin-bottom:4px;}
.how-title{font-weight:600;font-size:16px;color:var(--navy-900);}
.how-body{font-size:14px;color:var(--fg-2);line-height:1.6;margin:0;}
.section-eyebrow{font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--brand-blue);text-align:center;margin-bottom:10px;}
.section-title{font-family:var(--font-serif);font-size:32px;color:var(--navy-900);text-align:center;margin:0;font-weight:400;letter-spacing:-.01em;}
@media(max-width:720px){.how-grid{grid-template-columns:1fr;}.prompts-grid{grid-template-columns:1fr;}}
</style>
</head>

/* ── HERO ── */

      <div style={heroStyles.eyebrow}>AdviceHR · Benefits Coach</div>
      <h1 style={heroStyles.title}>
        Say hi to <span style={heroStyles.titleAccent}>Paul</span>,
        <br />your benefits coach.
      </h1>
      <p style={heroStyles.sub}>
        Benefits can be confusing, and understanding how to get quality medical care at the lowest cost

const heroStyles = {
  wrap: { maxWidth: 760, margin: "40px auto 32px", textAlign: "center", padding: "0 24px" },
  eyebrow: { fontFamily: "var(--font-sans)", fontSize: 12, fontWeight: 500, letterSpacing: "0.16em", textTransform: "uppercase", color: "var(--brand-blue)", marginBottom: 18 },
  title: { fontFamily: "var(--font-serif)", fontSize: "clamp(40px, 6vw, 60px)", lineHeight: 1.08, letterSpacing: "-0.015em", color: "var(--navy-900)", margin: "0 0 22px", fontWeight: 400 },
  titleAccent: { color: "var(--brand-blue)" },
  sub: { fontFamily: "var(--font-sans)", fontSize: 18, lineHeight: 1.6, color: "var(--fg-2)", margin: "0 auto", maxWidth: 600 },
  pills: { marginTop: 28, display: "flex", flexWrap: "wrap", gap: 10, justifyContent: "center" },

  pillDot: { width: 6, height: 6, borderRadius: 999, background: "var(--success)" },
};

/* ── TRUST STRIP ── */

const trustStyles = {
  wrap: {
    maxWidth: 1120,
    margin: "28px auto 40px",
    padding: "24px",
    background: "var(--brand-blue-tint)",

    fontSize: 13.5,
    lineHeight: 1.55,
    color: "var(--fg-2)",
  },
};

/* ── CHAT WIDGET ── */
const WEBHOOK_URL = "https://default4c9bf63d82df4672b09053f103618d.d9.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/fbf6ebc05d8041b691f785527590e487/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=IF2xa5Y2h0LQu5SBlPkclVZrnnY_cAIbnkave_YQ7eY";


/* ═══════════════════════════════════════════════════════════
   ██  CONFIGURATION — ONLY UPDATE THE WEBHOOK URL         ██
   ═══════════════════════════════════════════════════════════ */


/* ═══════════════════════════════════════════════════════════
   ██  DO NOT EDIT BELOW THIS LINE                         ██
   ═══════════════════════════════════════════════════════════ */

function ChatWidget() {
  const [stage, setStage]               = useState("gate");
  const [code, setCode]                 = useState("");
  const [codeError, setCodeError]       = useState(false);
  const [checking, setChecking]         = useState(false);
  const [clientName, setClientName]     = useState("");
  const [messages, setMessages]         = useState([]);
  const [draft, setDraft]               = useState("");
  const [isLoading, setIsLoading]       = useState(false);
  const [validatedCode, setValidatedCode] = useState("");
  const [userIP, setUserIP]             = useState("unknown");
  const [history, setHistory]           = useState([]);
  const chatRef                         = useRef(null);
  const textareaRef                     = useRef(null);

  // Grab user IP on mount
  useEffect(() => {
    fetch("https://api.ipify.org?format=json")
      .then(r => r.json())
      .then(d => setUserIP(d.ip))
      .catch(() => {});
  }, []);

  // Scroll to bottom on new messages
  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, isLoading]);

  // ─── ACCESS CODE VALIDATION ────────────────────────────────
  async function validate() {
    if (!code.trim() || checking) return;
    setChecking(true);
    setCodeError(false);

    try {
      const res  = await fetch(WEBHOOK_URL, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          accessCode:          code.trim(),
          conversationHistory: [],
          ipAddress:           userIP,
          validateOnly:        true
        })
      });
      const data = await res.json();

      if (res.ok && data.clientName) {
        setValidatedCode(code.trim());
        setClientName(data.clientName);
        setStage("chat");
      } else {
        setCodeError(true);
        setCode("");
      }
    } catch {
      setCodeError(true);
      setCode("");
    } finally {
      setChecking(false);
    }
  }

  // ─── SEND MESSAGE ──────────────────────────────────────────
  async function send(text) {
    const userText = (text ?? draft).trim();
    if (!userText || isLoading) return;

    const newHistory = [...history, { role: "user", content: userText }];
    setHistory(newHistory);
    setMessages(m => [...m, { role: "user", content: userText }]);
    setDraft("");
    if (textareaRef.current) textareaRef.current.style.height = "auto";
    setIsLoading(true);

    try {
      const res  = await fetch(WEBHOOK_URL, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          clientName:          clientName,
          accessCode:          validatedCode,
          conversationHistory: newHistory,
          ipAddress:           userIP,
          validateOnly:        false
        })
      });

      if (!res.ok) throw new Error("Bad response");

      const data  = await res.json();
      const reply = data.reply || data.message || data.response;
      if (!reply) throw new Error("No reply");

      setHistory(h => [...h, { role: "assistant", content: reply }]);
      setMessages(m => [...m, { role: "assistant", content: reply }]);

    } catch {
      setMessages(m => [...m, { role: "error", content: "Something went wrong. Please try again or contact your HR team." }]);
    } finally {
      setIsLoading(false);
    }
  }

  // ─── RENDER ────────────────────────────────────────────────
  return (
    <div style={ws.shell}>

      {/* HEADER */}
      <div style={ws.header}>
        <div style={ws.headerIcon}>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#fff">
            <path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
          </svg>
        </div>
        <div style={{ flex: 1 }}>
          <div style={ws.headerTitle}>Chat with Paul</div>
          <div style={ws.headerSub}>Get smarter about employee benefits in 10 minutes</div>
        </div>
        <div style={ws.statusDot} />
      </div>

      {/* ACCESS CODE GATE */}
      {stage === "gate" && (
        <div style={ws.gate}>
          <div style={ws.lock}>
            <svg viewBox="0 0 24 24" width="26" height="26" fill="var(--navy-900)">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
          </div>
          <h2 style={ws.gateTitle}>Enter your access code</h2>
          <p style={ws.gateBody}>Your employer provided a code to access this benefits advisor. Enter it below to get started.</p>
          {codeError && (
            <p style={ws.gateError}>Invalid code. Please check with your employer.</p>
          )}
          <input
            style={{ ...ws.codeInput, borderColor: codeError ? "#e74c3c" : "var(--border-default)" }}
            value={code}
            placeholder="e.g. 1234"
            maxLength={6}
            onChange={e => { setCode(e.target.value); setCodeError(false); }}
            onKeyDown={e => e.key === "Enter" && validate()}
          />
          <button
            style={{ ...ws.primary, opacity: checking || !code.trim() ? 0.5 : 1, cursor: checking || !code.trim() ? "not-allowed" : "pointer" }}
            disabled={checking || !code.trim()}
            onClick={validate}
          >
            {checking ? "Checking…" : "Continue"}
          </button>
        </div>
      )}

      {/* CHAT */}
      {stage === "chat" && (
        <>
          <div style={ws.clientBar}>
            <span style={{ opacity: 0.6 }}>Client:</span>&nbsp;{clientName}
          </div>

          <div ref={chatRef} style={ws.chat}>
            {messages.length === 0 && (
              <div style={ws.welcome}>
                <h3 style={ws.welcomeTitle}>Hello, how can I help?</h3>
                <p style={ws.welcomeBody}>I can help you understand your health insurance options and choose the right plan during open enrollment.</p>
                <div style={ws.chips}>
                  {["What plans are available?", "Compare Basic vs Premium", "What does my plan cover?", "How do deductibles work?"].map(c => (
                    <button key={c} style={ws.chip} onClick={() => send(c)}>{c}</button>
                  ))}
                </div>
              </div>
            )}

            {messages.map((m, i) => {
              if (m.role === "error") {
                return (
                  <div key={i} style={ws.errorBubble}>{m.content}</div>
                );
              }
              return (
                <div key={i} style={{ ...ws.row, flexDirection: m.role === "user" ? "row-reverse" : "row" }}>
                  <div style={{ ...ws.avatar, background: m.role === "user" ? "var(--accent-100)" : "var(--navy-900)", color: m.role === "user" ? "var(--navy-900)" : "#fff" }}>
                    {m.role === "user" ? "You" : "AI"}
                  </div>
                  {m.role === "assistant" ? (
                    <div
                      style={{ ...ws.bubble, background: "var(--bg-200)", color: "var(--fg-1)", border: "1px solid var(--border-default)", borderBottomLeftRadius: 4 }}
                      dangerouslySetInnerHTML={{ __html: typeof marked !== "undefined" ? marked.parse(m.content) : m.content }}
                    />
                  ) : (
                    <div style={{ ...ws.bubble, background: "var(--navy-900)", color: "#fff", borderBottomRightRadius: 4 }}>
                      {m.content}
                    </div>
                  )}
                </div>
              );
            })}

            {isLoading && (
              <div style={ws.row}>
                <div style={{ ...ws.avatar, background: "var(--navy-900)", color: "#fff" }}>AI</div>
                <div style={ws.typing}>
                  <span style={ws.dot} />
                  <span style={{ ...ws.dot, animationDelay: "0.15s" }} />
                  <span style={{ ...ws.dot, animationDelay: "0.30s" }} />
                </div>
              </div>
            )}
          </div>

          <div style={ws.inputArea}>
            <div style={ws.inputRow}>
              <textarea
                ref={textareaRef}
                style={ws.textarea}
                rows={1}
                placeholder="Ask about your benefits…"
                value={draft}
                onChange={e => {
                  setDraft(e.target.value);
                  e.target.style.height = "auto";
                  e.target.style.height = Math.min(e.target.scrollHeight, 100) + "px";
                }}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
              />
              <button style={{ ...ws.sendBtn, opacity: !draft.trim() || isLoading ? 0.5 : 1 }} onClick={() => send()} disabled={!draft.trim() || isLoading}>
                <svg viewBox="0 0 24 24" width="14" height="14" fill="#fff"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
              </button>
            </div>
            <div style={ws.hint}>Press Enter to send · Shift+Enter for new line</div>
          </div>
        </>
      )}

      <style>{`
        @keyframes pulseDot { 0%,80%,100% { transform:translateY(0);opacity:.4 } 40% { transform:translateY(-6px);opacity:1 } }
        @keyframes fadeUp { from { opacity:0;transform:translateY(8px) } to { opacity:1;transform:translateY(0) } }
        .paul-bubble-ai h1,.paul-bubble-ai h2,.paul-bubble-ai h3 { font-size:15px;font-weight:600;color:var(--navy-900);margin:10px 0 4px; }
        .paul-bubble-ai p { margin:4px 0; }
        .paul-bubble-ai ul,.paul-bubble-ai ol { padding-left:18px;margin:4px 0; }
        .paul-bubble-ai li { margin:3px 0; }
        .paul-bubble-ai strong { font-weight:600;color:var(--navy-900); }
        .paul-bubble-ai table { width:100%;border-collapse:collapse;font-size:13px;margin:6px 0; }
        .paul-bubble-ai th { background:var(--navy-900);color:#fff;padding:5px 8px;text-align:left; }
        .paul-bubble-ai td { padding:5px 8px;border-bottom:1px solid var(--border-default); }
        .paul-bubble-ai tr:nth-child(even) td { background:rgba(10,61,98,0.04); }
      `}</style>
    </div>
  );
}

const ws = {
  shell:        { width:"100%", maxWidth:680, margin:"0 auto", background:"#fff", borderRadius:20, boxShadow:"0 18px 48px rgba(10,61,98,0.14)", display:"flex", flexDirection:"column", overflow:"hidden", height:640 },

/* ── FAQ ── */
const { useState: useFAQState } = React;

function FAQ() {
  const [open, setOpen] = useFAQState(0);
  const items = [
    { q: "What is Paul?", a: "Paul is an AI-powered benefits coach available through your employer. He answers questions about your health plans, deductibles, and enrollment choices in plain English." },
    { q: "Is what I ask shared with my employer?", a: "No. Your conversation is private and confidential. We don't collect your name, and nothing you ask is shared with your HR team or employer." },
    { q: "Can Paul tell me what plan to pick?", a: "Paul provides educational guidance to help you understand your options. He does not provide medical, legal, or financial advice. For personal decisions, consult your HR department or AdviceHR." },
    { q: "Where do I get my access code?", a: "Access codes are only available through your employer, usually shared by email. If you can't find yours, reach out to your HR contact and they'll send it over." },
    { q: "Does Paul know my company's specific plans?", a: "Yes. Paul knows your medical plans and your ancillary benefits too, including dental, vision, life, disability, and anything else your employer offers. Your employer loads the exact plan details (carriers, networks, deductibles, copays, covered prescriptions) so Paul's answers match the benefits actually available to you." },
  ];
  return (
    <section id="faq" style={faqStyles.wrap}>
      <div style={faqStyles.eyebrow}>Common questions</div>
      <h2 style={faqStyles.title}>Quick answers before you start</h2>
      <div style={faqStyles.list}>
        {items.map((it, i) => (
          <div key={i} style={{ ...faqStyles.item, borderColor: open === i ? "var(--accent-500)" : "var(--border-default)" }}>
            <button style={faqStyles.q} onClick={() => setOpen(open === i ? -1 : i)}>
              <span>{it.q}</span>
              <span style={{ ...faqStyles.chev, transform: open === i ? "rotate(180deg)" : "none" }}>
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </span>
            </button>
            {open === i && <div style={faqStyles.a}>{it.a}</div>}
          </div>
        ))}
      </div>
    </section>
  );
}
